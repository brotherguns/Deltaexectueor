name: Build Tweak
on:
  push:
    paths:
      - '**.x'
      - '**.xm'
      - 'Makefile'
      - 'control'
      - '.github/workflows/build.yml'
  workflow_dispatch:
env:
  THEOS: ${{ github.workspace }}/theos
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect tweak file & Generate Configs
        run: |
          TWEAK_FILE=$(find . -maxdepth 2 \( -name "*.x" -o -name "*.xm" \) | grep -v ".git" | head -n 1)
          if [ -z "$TWEAK_FILE" ]; then
            echo "[-] No .x or .xm file found! Bailing out."
            exit 1
          fi
          TWEAK_FILE="${TWEAK_FILE#./}"
          TWEAK_NAME=$(basename "$TWEAK_FILE" | sed 's/\.[^.]*$//')
          echo "TWEAK_FILE=$TWEAK_FILE" >> $GITHUB_ENV
          echo "TWEAK_NAME=$TWEAK_NAME" >> $GITHUB_ENV
          echo "[+] Found: $TWEAK_FILE (name: $TWEAK_NAME)"
          if [ ! -f "Makefile" ]; then
            printf 'ARCHS = arm64 arm64e\nTARGET = iphone:clang:14.5:14.0\n\ninclude $(THEOS)/makefiles/common.mk\n\nTWEAK_NAME = %s\n%s_FILES = %s\n%s_CFLAGS = -fobjc-arc\n%s_FRAMEWORKS = UIKit Foundation\n\ninclude $(THEOS_MAKE_PATH)/tweak.mk\n' "$TWEAK_NAME" "$TWEAK_NAME" "$TWEAK_FILE" "$TWEAK_NAME" "$TWEAK_NAME" > Makefile
            echo "[+] Generated Makefile"
          fi
          if [ ! -f "control" ]; then
            printf 'Package: com.jack.%s\nName: %s\nVersion: 1.0.0\nArchitecture: iphoneos-arm64\nDescription: Automated build\nMaintainer: Jack\nAuthor: Jack\nSection: Tweaks\n' "${TWEAK_NAME,,}" "$TWEAK_NAME" > control
            echo "[+] Generated control"
          fi

      - name: Install System Dependencies & ldid
        run: |
          sudo apt-get update && sudo apt-get install -y curl git make perl zip fakeroot xz-utils libtinfo5 libncurses5
          sudo curl -L https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64 -o /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid

      - name: Cache Theos, Toolchain & SDKs
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: ${{ github.workspace }}/theos
          key: theos-linux-v7

      - name: Clone Theos, Toolchain & SDKs
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          echo "[*] Cloning Theos..."
          git clone --recursive https://github.com/theos/theos $THEOS

          echo "[*] Fetching iOS Toolchain for Linux..."
          curl -L https://github.com/sbingner/llvm-project/releases/latest/download/linux-ios-arm64e-clang-toolchain.tar.lzma -o toolchain.tar.lzma
          mkdir -p $THEOS/toolchain/linux/iphone
          tar -xf toolchain.tar.lzma -C $THEOS/toolchain/linux/iphone --strip-components=1
          rm toolchain.tar.lzma

          echo "[*] Cloning SDKs..."
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Patch Makefile SDK Target
        run: sed -i 's/iphone:clang:latest/iphone:clang:14.5/g' Makefile

      - name: Build Tweak
        run: make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TWEAK_NAME }}-deb
          path: packages/*.deb
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
