name: Build Tweak

on:
  push:
    paths:
      - '**.x'
      - '**.xm'
      - 'Makefile'
      - 'control'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect tweak file
        run: |
          TWEAK_FILE=$(find . -maxdepth 2 \( -name "*.x" -o -name "*.xm" \) | grep -v ".git" | head -n 1)
          if [ -z "$TWEAK_FILE" ]; then
            echo "No .x or .xm file found!"
            exit 1
          fi
          TWEAK_FILE="${TWEAK_FILE#./}"
          TWEAK_NAME=$(basename "$TWEAK_FILE" | sed 's/\.[^.]*$//')
          echo "TWEAK_FILE=$TWEAK_FILE" >> $GITHUB_ENV
          echo "TWEAK_NAME=$TWEAK_NAME" >> $GITHUB_ENV
          echo "Found: $TWEAK_FILE (name: $TWEAK_NAME)"

      - name: Generate Makefile if missing
        run: |
          if [ ! -f "Makefile" ]; then
            printf 'ARCHS = arm64 arm64e\nTARGET = iphone:clang:latest:14.0\n\ninclude $(THEOS)/makefiles/common.mk\n\nTWEAK_NAME = %s\n%s_FILES = %s\n%s_CFLAGS = -fobjc-arc\n%s_FRAMEWORKS = UIKit Foundation\n\ninclude $(THEOS_MAKE_PATH)/tweak.mk\n' "$TWEAK_NAME" "$TWEAK_NAME" "$TWEAK_FILE" "$TWEAK_NAME" "$TWEAK_NAME" > Makefile
            echo "Generated Makefile"
          fi

      - name: Generate control file if missing
        run: |
          if [ ! -f "control" ]; then
            printf 'Package: com.example.%s\nName: %s\nVersion: 1.0.0\nArchitecture: iphoneos-arm64\nDescription: Auto-built tweak\nMaintainer: Unknown\nAuthor: Unknown\nSection: Tweaks\n' "$TWEAK_NAME" "$TWEAK_NAME" > control
            echo "Generated control"
          fi

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: /theos
          key: theos-${{ runner.os }}-v1

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y curl git make perl zip
          sudo git clone --recursive https://github.com/theos/theos /theos
          sudo chmod -R 777 /theos

      - name: Cache SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: /theos/sdks
          key: theos-sdk-16.5

      - name: Download SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          sudo curl -L "https://github.com/theos/sdks/archive/refs/heads/master.tar.gz" -o sdks.tar.gz
          sudo tar -xf sdks.tar.gz --strip-components=1 -C /theos/sdks/
          sudo rm sdks.tar.gz

      - name: Build
        env:
          THEOS: /theos
          THEOS_MAKE_PATH: /theos/makefiles
        run: |
          make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TWEAK_NAME }}-deb
          path: packages/*.deb
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
